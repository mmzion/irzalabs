<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Electricity Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f9; color: #333; margin: 0; padding: 20px; text-align: center; }
        .card { background: white; max-width: 450px; margin: 40px auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: #2c3e50; font-size: 24px; margin-bottom: 5px; }
        .room-tag { background: #3498db; color: white; padding: 3px 12px; border-radius: 20px; font-size: 14px; display: inline-block; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 25px 0; }
        .metric { background: #f8f9fa; padding: 15px; border-radius: 8px; border-left: 4px solid #3498db; text-align: left; }
        .metric label { font-size: 12px; color: #7f8c8d; text-transform: uppercase; }
        .metric div { font-size: 20px; font-weight: bold; margin-top: 5px; }
        .status { font-weight: bold; padding: 10px; border-radius: 6px; margin-top: 20px; }
        .status.ON { background: #d4edda; color: #155724; }
        .status.OFF { background: #f8d7da; color: #721c24; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.6; } }
    </style>
</head>
<body>

    <div class="card">
        <h1 id="roomTitle">Room Dashboard</h1>
        <span class="room-tag" id="roomSub">Loading...</span>

        <div class="grid">
            <div class="metric">
                <label>Allocated Units</label>
                <div id="allocUnits">0.00 kWh</div>
            </div>
            <div class="metric">
                <label>Current Used</label>
                <div id="currUnits">0.00 kWh</div>
            </div>
            <div class="metric">
                <label>Live Power</label>
                <div id="livePower">0 W</div>
            </div>
            <div class="metric">
                <label>Voltage</label>
                <div id="voltage">0 V</div>
            </div>
        </div>

        <div id="statusBox" class="status ON">STATUS: LOADING...</div>
    </div>

    <script>
        // ⚠️ আপনার Firebase কনফিগারেশন এখানে বসান
const firebaseConfig = {
    apiKey: "AIzaSyC8NcbOPzhbUnm9NxOZyzdEJSLk_LOGYcc",
    authDomain: "irza-labs.firebaseapp.com",
    databaseURL: "https://irza-labs-default-rtdb.firebaseio.com", // আপনার প্রোজেক্ট আইডি অনুযায়ী এই লিংকটি সেট করা হয়েছে
    projectId: "irza-labs",
    storageBucket: "irza-labs.firebasestorage.app",
    messagingSenderId: "269557073409",
    appId: "1:269557073409:web:4c2977681884d733f62200"
};
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // URL থেকে রুমের নাম নেওয়া (e.g., index.html?room=room1)
        const urlParams = new URLSearchParams(window.location.search);
        let room = urlParams.get('room') || 'room1';
        
        document.getElementById('roomTitle').innerText = room.toUpperCase() + " Status";
        document.getElementById('roomSub').innerText = "Student View";

        // ফায়ারবেস থেকে রিয়েল-টাইম ডেটা রিড
        db.ref('rooms/' + room).on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                document.getElementById('allocUnits').innerText = parseFloat(data.allocated_units).toFixed(2) + " kWh";
                document.getElementById('currUnits').innerText = parseFloat(data.current_units).toFixed(2) + " kWh";
                document.getElementById('livePower').innerText = parseFloat(data.power).toFixed(1) + " W";
                document.getElementById('voltage').innerText = parseFloat(data.voltage).toFixed(1) + " V";
                
                const statusBox = document.getElementById('statusBox');
                statusBox.innerText = "STATUS: " + data.status;
                
                if(data.status.includes("ON")) {
                    statusBox.className = "status ON";
                } else {
                    statusBox.className = "status OFF";
                }
            }
        });
    </script>
</body>
</html>
